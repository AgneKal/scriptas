<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fingerprint Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
    }
    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 10px;
      margin-top: 20px;
    }
    .label {
      color: #94a3b8;
    }
    .value {
      font-weight: bold;
      color: #38bdf8;
    }
    .low {
      color: #f87171;
    }
    .medium {
      color: #facc15;
    }
    .high {
      color: #4ade80;
    }
  </style>
</head>
<body>

<h1>Fingerprint Test</h1>
<p>Naudok šį puslapį skirtingose naršyklėse ir režimuose.</p>

<div class="card" id="result">Loading...</div>

<script>
(async () => {
  try {
    const fpPromise = import('https://fpjscdn.net/v3/YOUR_PUBLIC_API_KEY')
      .then(FingerprintJS => FingerprintJS.load());

    const fp = await fpPromise;
    const result = await fp.get({ extendedResult: true });

    const score = result.confidence.score;

    function scoreClass(score) {
      if (score >= 0.9) return 'high';
      if (score >= 0.7) return 'medium';
      return 'low';
    }

    const data = {
      visitorId: result.visitorId,
      confidenceScore: score,
      visitorFound: result.visitorFound,
      incognito: result.incognito,
      browserName: result.components.browserName?.value,
      browserVersion: result.components.browserVersion?.value,
      os: result.components.os?.value,
      device: result.components.device?.value,
      timestamp: new Date().toISOString()
    };

    document.getElementById('result').innerHTML = `
      <div><span class="label">Visitor ID:</span> <span class="value">${data.visitorId}</span></div>
      <div><span class="label">Confidence:</span> 
        <span class="value ${scoreClass(score)}">${data.confidenceScore}</span>
      </div>
      <div><span class="label">Visitor Found:</span> <span class="value">${data.visitorFound}</span></div>
      <div><span class="label">Incognito:</span> <span class="value">${data.incognito}</span></div>
      <div><span class="label">Browser:</span> <span class="value">${data.browserName} ${data.browserVersion}</span></div>
      <div><span class="label">OS:</span> <span class="value">${data.os}</span></div>
      <div><span class="label">Device:</span> <span class="value">${data.device}</span></div>
      <div><span class="label">Time:</span> <span class="value">${data.timestamp}</span></div>
    `;

    console.log('FULL RESULT:', result);

  } catch (e) {
    document.getElementById('result').innerHTML = `
      <div style="color:red;">Error loading fingerprint</div>
      <pre>${e}</pre>
    `;
    console.error(e);
  }
})();
</script>

</body>
</html>
