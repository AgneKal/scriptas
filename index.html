<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Fingerprint Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 10px;
      margin-top: 20px;
      line-height: 1.8;
    }
    .label { color: #94a3b8; }
    .value { font-weight: bold; color: #38bdf8; }
    .low { color: #f87171; }
    .medium { color: #facc15; }
    .high { color: #4ade80; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>Fingerprint Test</h1>

  <div class="card" id="result">Loading...</div>

  <script type="module">
    const resultEl = document.getElementById('result');

    function scoreClass(score) {
      if (score >= 0.9) return 'high';
      if (score >= 0.7) return 'medium';
      return 'low';
    }

    try {
      const FingerprintJS = await import('https://fpjscdn.net/v3/nJfJ9KmmgMTfln8ARpnL');
      const fp = await FingerprintJS.load();

      const result = await fp.get({ extendedResult: true });
      console.log('FULL RESULT:', result);

      const score = result.confidence?.score;

      resultEl.innerHTML = `
        <div><span class="label">Request ID:</span> <span class="value">${result.requestId ?? 'N/A'}</span></div>
        <div><span class="label">Visitor ID:</span> <span class="value">${result.visitorId ?? 'N/A'}</span></div>
        <div><span class="label">Confidence:</span> <span class="value ${scoreClass(score ?? 0)}">${score ?? 'N/A'}</span></div>
        <div><span class="label">Visitor Found:</span> <span class="value">${String(result.visitorFound ?? 'N/A')}</span></div>
        <div><span class="label">Incognito:</span> <span class="value">${String(result.incognito ?? 'N/A')}</span></div>
        <div><span class="label">Browser:</span> <span class="value">${result.browserName ?? 'N/A'} ${result.browserVersion ?? ''}</span></div>
        <div><span class="label">OS:</span> <span class="value">${result.os ?? 'N/A'}</span></div>
        <div><span class="label">Device:</span> <span class="value">${result.device ?? 'N/A'}</span></div>
        <div><span class="label">IP:</span> <span class="value">${result.ip ?? 'N/A'}</span></div>
        <div><span class="label">Time:</span> <span class="value">${new Date().toISOString()}</span></div>
      `;
    } catch (error) {
      console.error(error);
      resultEl.innerHTML = `
        <div style="color:#f87171;font-weight:bold;">Error loading fingerprint</div>
        <pre>${error?.message || String(error)}</pre>
      `;
    }
  </script>
</body>
</html>
