<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Fingerprint Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      margin-top: 0;
    }
    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 10px;
      margin-top: 20px;
      line-height: 1.7;
    }
    .label {
      color: #94a3b8;
    }
    .value {
      font-weight: bold;
      color: #38bdf8;
    }
    .low { color: #f87171; }
    .medium { color: #facc15; }
    .high { color: #4ade80; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Fingerprint Test</h1>
  <p>Naudok šį puslapį skirtingose naršyklėse ir režimuose.</p>

  <div class="card" id="result">Loading...</div>

  <script type="module">
    const resultEl = document.getElementById('result');

    function scoreClass(score) {
      if (score >= 0.9) return 'high';
      if (score >= 0.7) return 'medium';
      return 'low';
    }

    try {
      const Fingerprint = await import('https://fpjscdn.net/v4/nJfJ9KmmgMTfln8ARpnL');

      const fp = await Fingerprint.start({
        apiKey: 'YOUR_PUBLIC_API_KEY'
      });

      const result = await fp.get({ extendedResult: true });
      const score = result.confidence?.score ?? null;

      const data = {
        visitorId: result.visitorId,
        confidenceScore: score,
        visitorFound: result.visitorFound,
        incognito: result.incognito,
        browserName: result.components?.browserName?.value ?? 'N/A',
        browserVersion: result.components?.browserVersion?.value ?? 'N/A',
        os: result.components?.os?.value ?? 'N/A',
        device: result.components?.device?.value ?? 'N/A',
        timestamp: new Date().toISOString()
      };

      resultEl.innerHTML = `
        <div><span class="label">Visitor ID:</span> <span class="value">${data.visitorId}</span></div>
        <div><span class="label">Confidence:</span> <span class="value ${scoreClass(score ?? 0)}">${data.confidenceScore ?? 'N/A'}</span></div>
        <div><span class="label">Visitor Found:</span> <span class="value">${String(data.visitorFound)}</span></div>
        <div><span class="label">Incognito:</span> <span class="value">${String(data.incognito)}</span></div>
        <div><span class="label">Browser:</span> <span class="value">${data.browserName} ${data.browserVersion}</span></div>
        <div><span class="label">OS:</span> <span class="value">${data.os}</span></div>
        <div><span class="label">Device:</span> <span class="value">${data.device}</span></div>
        <div><span class="label">Time:</span> <span class="value">${data.timestamp}</span></div>
      `;

      console.log('FULL RESULT:', result);
    } catch (error) {
      resultEl.innerHTML = `
        <div style="color:#f87171;font-weight:bold;">Error loading fingerprint</div>
        <pre>${error?.message || error}</pre>
      `;
      console.error(error);
    }
  </script>
</body>
</html>
